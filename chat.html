<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثات - منصتي</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container {
            display: flex;
            height: calc(100vh - 150px);
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin: 20px 0;
        }
        
        /* قائمة المحادثات */
        .conversations-list {
            width: 350px;
            border-left: 1px solid #e0e6ed;
            overflow-y: auto;
            background: #fafbfc;
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #e0e6ed;
            transition: background 0.2s;
        }
        
        .conversation-item:hover {
            background: #f0f4f9;
        }
        
        .conversation-item.active {
            background: linear-gradient(135deg, #ff6b3520, #f7b32b20);
            border-right: 3px solid #ff6b35;
        }
        
        .conv-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b35, #f7b32b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-left: 15px;
        }
        
        .conv-info {
            flex: 1;
        }
        
        .conv-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .conv-last-message {
            font-size: 13px;
            color: #6c7a8a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .conv-time {
            font-size: 11px;
            color: #6c7a8a;
        }
        
        /* نافذة الشات */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e6ed;
            background: white;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message-sent {
            background: linear-gradient(135deg, #ff6b35, #f7b32b);
            color: white;
            align-self: flex-end;
            border-bottom-left-radius: 5px;
        }
        
        .message-received {
            background: #f0f4f9;
            color: #1a2a3a;
            align-self: flex-start;
            border-bottom-right-radius: 5px;
        }
        
        .message-audio {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .message-audio button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #e0e6ed;
            display: flex;
            gap: 10px;
            background: white;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e6ed;
            border-radius: 25px;
            outline: none;
        }
        
        .chat-input-area button {
            background: #ff6b35;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .voice-record-btn {
            background: #4a5568;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #6c7a8a;
        }
        
        body.dark-mode .chat-container {
            background: #1e2438;
        }
        
        body.dark-mode .conversations-list {
            background: #1a1f2e;
            border-left-color: #2a3148;
        }
        
        body.dark-mode .conversation-item {
            border-bottom-color: #2a3148;
        }
        
        body.dark-mode .conversation-item:hover {
            background: #2a3148;
        }
        
        body.dark-mode .chat-window,
        body.dark-mode .chat-header,
        body.dark-mode .chat-input-area {
            background: #1e2438;
            border-color: #2a3148;
        }
        
        body.dark-mode .message-received {
            background: #2a3148;
            color: #eef2ff;
        }
        
        body.dark-mode .chat-input-area input {
            background: #2a3148;
            border-color: #3a4158;
            color: white;
        }
        
        body.dark-mode .conv-last-message,
        body.dark-mode .conv-time {
            color: #8a94b0;
        }
    </style>
</head>
<body>

<header>
    <div class="container header-flex">
        <h1>منصتي</h1>
        <div class="header-buttons">
            <button id="darkModeToggle" class="toggle-btn">🌙</button>
            <a href="index.html" class="btn-secondary">🏠 الرئيسية</a>
            <div id="authButtons">
                <a href="login.html" class="btn-secondary">🔐 دخول</a>
                <a href="register.html" class="btn-primary">➕ حساب جديد</a>
            </div>
            <div id="userMenu" style="display:none;">
                <span id="userName" style="margin-left: 10px;"></span>
                <a href="public-profile.html" class="btn-secondary">👤 بروفايلي</a>
                <button id="logoutBtn" class="btn-outline">🚪 خروج</button>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <div class="chat-container">
        <div class="conversations-list" id="conversationsList">
            <div class="empty-state">جاري التحميل...</div>
        </div>
        <div class="chat-window" id="chatWindow">
            <div class="empty-state">
                💬 اختر محادثة من اليسار<br>
                أو ابدأ محادثة جديدة من البروفايل
            </div>
        </div>
    </div>
</main>

<script src="js/dark-mode.js"></script>
<script src="js/auth.js"></script>
<script src="js/database.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
