<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - منصتي</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- إضافة Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>

<header>
    <div class="container header-flex">
        <h1>منصتي</h1>
        <div class="header-buttons">
            <button id="darkModeToggle" class="toggle-btn">🌙</button>
            <a href="index.html" class="btn-secondary">🏠 الرئيسية</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="auth-container" style="max-width: 550px;">
        <h2 style="text-align: center;">➕ إنشاء حساب جديد</h2>
        <form id="registerForm">
            <div>
                <label>📧 البريد الإلكتروني *</label>
                <input type="email" id="regEmail" required placeholder="example@domain.com">
            </div>
            <div>
                <label>👤 الاسم الكامل *</label>
                <input type="text" id="regName" required placeholder="محمد أحمد">
            </div>
            <div>
                <label>📱 رقم الهاتف *</label>
                <input type="tel" id="regPhone" required placeholder="+213 5XXXXXXXX">
            </div>
            <div>
                <label>🔑 كلمة المرور *</label>
                <input type="password" id="regPassword" required placeholder="********">
            </div>
            <div>
                <label>🔑 تأكيد كلمة المرور *</label>
                <input type="password" id="regConfirmPassword" required placeholder="********">
            </div>
            <div>
                <label>📍 الموقع (اختياري)</label>
                <input type="text" id="regLocation" placeholder="مدينتك">
            </div>
            <div>
                <label>📝 نبذة عنك (اختياري)</label>
                <textarea id="regBio" rows="3" placeholder="أخبرنا عن نفسك..."></textarea>
            </div>
            <div>
                <label>📱 واتساب (اختياري)</label>
                <input type="text" id="regWhatsapp" placeholder="رقم الواتساب">
            </div>
            <div>
                <label>✈️ تيليغرام (اختياري)</label>
                <input type="text" id="regTelegram" placeholder="@username">
            </div>
            <button type="submit" class="btn-primary" style="width:100%;">إنشاء حساب</button>
            <p style="text-align: center; margin-top: 20px;">
                لديك حساب؟ <a href="login.html">سجل دخولك</a>
            </p>
        </form>
    </div>
</div>

<script src="js/dark-mode.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-database.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        
        if (password !== confirm) {
            alert('❌ كلمة المرور غير متطابقة');
            return;
        }
        
        const userData = {
            email: document.getElementById('regEmail').value,
            name: document.getElementById('regName').value,
            phone: document.getElementById('regPhone').value,
            password: password,
            location: document.getElementById('regLocation').value,
            bio: document.getElementById('regBio').value,
            whatsapp: document.getElementById('regWhatsapp').value,
            telegram: document.getElementById('regTelegram').value
        };
        
        try {
            await registerUser(userData);
            alert('✅ تم التسجيل بنجاح! يمكنك تسجيل الدخول الآن');
            window.location.href = 'login.html';
        } catch(error) {
            alert('❌ خطأ: ' + error);
        }
    });
</script>
<style>
    .auth-container input, .auth-container textarea {
        width: 100%;
        padding: 12px;
        margin: 8px 0 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-family: inherit;
    }
    body.dark-mode .auth-container input,
    body.dark-mode .auth-container textarea {
        background: #2a3148;
        border-color: #3a4158;
        color: white;
    }
</style>
</body>
</html>
