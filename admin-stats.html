<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات المشرف - منصتي</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .stat-number {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #6c7a8a;
            font-size: 16px;
        }
        .section-title {
            margin: 30px 0 20px;
            color: #ff6b35;
        }
        .list-table {
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .list-table th,
        .list-table td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #e0e6ed;
        }
        .list-table th {
            background: #f0f4f9;
            font-weight: bold;
        }
        .list-table tr:last-child td {
            border-bottom: none;
        }
        .admin-badge {
            background: #ff6b35;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        body.dark-mode .stat-card,
        body.dark-mode .list-table {
            background: #1e2438;
        }
        body.dark-mode .list-table th {
            background: #2a3148;
            color: #eef2ff;
        }
        body.dark-mode .list-table td {
            border-bottom-color: #2a3148;
            color: #eef2ff;
        }
        body.dark-mode .stat-label {
            color: #8a94b0;
        }
    </style>
</head>
<body>

<header>
    <div class="container header-flex">
        <h1>منصتي</h1>
        <div class="header-buttons">
            <button id="darkModeToggle" class="toggle-btn">🌙</button>
            <a href="index.html" class="btn-secondary">🏠 الرئيسية</a>
            <a href="all-jobs.html" class="btn-secondary">📋 جميع الإعلانات</a>
            <div id="authButtons">
                <a href="login.html" class="btn-secondary">🔐 دخول</a>
                <a href="register.html" class="btn-primary">➕ حساب جديد</a>
            </div>
            <div id="userMenu" style="display:none;">
                <span id="userName" style="margin-left: 10px;"></span>
                <a href="public-profile.html" class="btn-secondary">👤 بروفايلي</a>
                <button id="logoutBtn" class="btn-outline">🚪 خروج</button>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <h2 style="margin: 20px 0;">📊 لوحة تحكم المشرف</h2>
    
    <div id="statsContent">
        <div class="loading-spinner">جاري التحميل...</div>
    </div>
</main>

<footer class="container">
    <p>جميع الحقوق محفوظة للطلبة ع.سيداحمد ش. يونس © 2026</p>
</footer>

<script src="js/dark-mode.js"></script>
<script src="js/auth.js"></script>
<script src="js/database.js"></script>
<script>
    async function loadAdminStats() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        
        // التحقق من صلاحيات المشرف
        if (!currentUser.isAdmin && currentUser.email !== 'amraouisidahmed44@gmail.com') {
            document.getElementById('statsContent').innerHTML = `
                <div class="card" style="text-align:center;padding:50px;">
                    ❌ غير مصرح لك بالدخول إلى هذه الصفحة<br>
                    هذه الصفحة مخصصة للمشرف فقط
                </div>
            `;
            return;
        }
        
        try {
            const stats = await getAdminStats();
            
            document.getElementById('statsContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${stats.totalUsers}</div>
                        <div class="stat-label">👥 إجمالي المستخدمين</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.totalJobs}</div>
                        <div class="stat-label">📢 إجمالي الإعلانات</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.totalVisitors}</div>
                        <div class="stat-label">👀 إجمالي الزوار</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.todayVisitors}</div>
                        <div class="stat-label">📅 زوار اليوم</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.totalRatings}</div>
                        <div class="stat-label">⭐ إجمالي التقييمات</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.avgRating}</div>
                        <div class="stat-label">📊 متوسط التقييم</div>
                    </div>
                </div>
                
                <h3 class="section-title">🆕 أحدث المستخدمين</h3>
                <table class="list-table">
                    <thead>
                        <tr><th>الاسم</th><th>البريد الإلكتروني</th><th>تاريخ التسجيل</th></tr>
                    </thead>
                    <tbody>
                        ${stats.recentUsers.map(user => `
                            <tr>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>${new Date(user.createdAt).toLocaleDateString('ar')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <h3 class="section-title">📰 أحدث الإعلانات</h3>
                <table class="list-table">
                    <thead>
                        <tr><th>العنوان</th><th>السعر</th><th>الموقع</th><th>تاريخ النشر</th></tr>
                    </thead>
                    <tbody>
                        ${stats.recentJobs.map(job => `
                            <tr>
                                <td><a href="job-details.html?id=${job.id}" style="color: #ff6b35;">${job.title}</a></td>
                                <td>${job.price} دولار</td>
                                <td>${job.location}</td>
                                <td>${new Date(job.createdAt).toLocaleDateString('ar')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch(error) {
            console.error(error);
            document.getElementById('statsContent').innerHTML = '<div class="card" style="text-align:center;padding:50px;">❌ حدث خطأ في تحميل الإحصائيات</div>';
        }
    }
    
    loadAdminStats();
</script>
</body>
</html>
